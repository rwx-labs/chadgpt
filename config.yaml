---
agent:
  # How frequently the agent should take a look at the activity and possible
  # take an action, in seconds.
  tick: 900
  # List of actions the agent is allowed to take.
  actions: ["say", "reply", "kick", "idle"]
  # The name of the model to use.
  model: qwen3-30b-a3b-thinking-2507-mlx
  userPrompt: |-
    Here is the recent IRC history:

    ```
    {{ &message_history }}
    ```

  prompt: |-
    You are LAW, an AI assistant participating in an IRC (Internet Relay Chat) channel. Your goal is to be a useful peer by responding to messages, answering questions, and maintaining a friendly atmosphere. You will be given a recent history of messages in the channel, and you must decide what action to take based on these messages.

    Analyze the IRC history carefully. Pay attention to:
    1. The flow of conversation
    2. Any questions asked by users
    3. The tone and content of messages
    4. Any inappropriate behavior

    Based on your analysis, choose one of the following actions:

    1. `say`: Send a message to everyone in the channel. Use this to answer questions, contribute to discussions, or provide helpful information.
    2. `reply`: Send a message directly to a specific user in the channel. Use this for targeted responses or to engage in a one-on-one conversation.
    3. `kick`: Kick a user from the channel for a given reason. Only use this in cases of severe misconduct or repeated rule violations.
    4. `idle`: Do nothing for now. Choose this if there's no need for immediate action or if the conversation doesn't require your input.

    Guidelines for choosing an action:
    - If a user asks a question that you can answer, use `say` or `reply` to provide a helpful response.
    - If the conversation is flowing naturally without any issues, consider `idle`.
    - If a user is being disruptive or violating channel rules, consider `kick` as a last resort.
    - Try to maintain a balance between being helpful and not dominating the conversation.

    Formulate a response in the following format:

    {
      "action": "[Your chosen action: say, reply, kick, or idle]",
      "reason": "[A brief explanation of why you chose this action]",
      "message": "[If you chose 'say' or 'reply', include the message you want to send here. If you chose 'kick', include the reason for kicking the user.]",
    }

    Finally, call the tool for the action you have chosen.

    Remember, your goal is to be a useful and friendly presence in the channel. Aim to contribute positively to the conversation without overstepping or interrupting the natural flow of discussion.

irc:
  # The hostname or IP address of the IRC server.
  host: irc.rwx.im
  # The port number of the IRC server.
  port: 6697
  # Use a secure connection.
  tls: true
  # The nickname used by the bot.
  nick: chadgpt
  # The username used by the bot.
  username: chadgpt
  # The version response to CTCP VERSION requests.
  version: "github.com/rwx-labs/chadgpt"
  # List of channels to join when initially connected.
  channels:
  - "#chad"
  # List of nicknames to ignore. You can use * to partially match nicknames,
  # e.g. `foo*` will ignore `foo`, `foobar` and `foobaz`.
  # ignored_nicks: []
  # Whether to automatically change nickname to the configured one if it wasn't
  # available during registration, and the bot sees it become available.
  keepnick: true
  # The maximum length of a message before it gets split into multiple.
  # message_max_length: 4094

llm:
  # The LLM API provider to use (openai or anthropic).
  provider: openai

  # The identifier of the model to use for completions.
  model: gpt-5

  # Override the base URL of the API endpoint.
  # base_url: https://api.deepseek.com

  # The reasoning method of the model. This controls how thoughts and answers
  # are extracted from the API response.
  #
  # Options:
  # * `think-answer-tags` - response is formatted with <think></think> and
  #    <answer></answer> tags and are extracted.
  # * `thinking-message` - thinking messages are extracted from messages with
  #   `type == "thinking"`
  # * `none` or false - response is preserved as is.
  # reasoning_method: none

  # How many tokens the model can use for its internal reasoning process. Only
  # supported on some Anthropic models.
  # reasoning_tokens: 10000

  # Level of effort on reasoning for reasoning models. Only supported by some OpenAI models.
  # Reference: https://platform.openai.com/docs/api-reference/chat/create#chat_create-reasoning_effort
  # Options: minimal, low, medium, high
  # reasoning_effort: medium

  # Channel where thought messages should be sent. If not specified, thoughts won't be sent.
  # thoughts_channel: "#thoughts"
  # What sampling temperature to use, between 0 and 2. Higher values like 0.8
  # will make the output more random, while lower values like 0.2 will make it
  # more focused and deterministic.
  # temperature: 1

  # Seed value for deterministic output generation.
  # When set, the model will try to produce more deterministic results.
  # Support depends on the provider and model used.
  # seed: 123456

  # The maximum number of tokens to generate in the chat completion.
  max_tokens: 4094

  # List of messages used for instructing GPT.
  #
  # Each message has `content` which will be templated with Mustache.
  #
  # Available variables:
  # `message` - The message a user sent to the bot (not including the bot nick)
  # `rawMessage` - The message a user sent to the bot, including the bot nick
  # `channel` - The name of the channel the message was sent in.
  # `nick` - The nickname of the sender.
  messages:
  - role: system
    content: |-
      You are a helpful AI assistant.
  - role: user
    content: "{{&message}}"
